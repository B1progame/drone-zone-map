name: Update source metadata
on:
  workflow_dispatch:
  schedule: [{ cron: '17 3 * * 1' }]
permissions: { contents: write }
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: python -m pip install ./pipeline
      - run: npm ci
      - run: npm test
      - run: python pipeline/main.py
      - run: python pipeline/audit_registry.py > /dev/null
      - run: python pipeline/main.py update-luxembourg
      - run: python pipeline/main.py update-public-geozones
      - run: npm run world:continue
      - run: npm run typecheck
      - run: npm run build
      - run: |
          git diff --quiet || (git config user.name 'github-actions[bot]' && git config user.email '41898282+github-actions[bot]@users.noreply.github.com' && git add public/data reports pipeline/state && git commit -m 'chore(data): update verified source metadata' && git push)
