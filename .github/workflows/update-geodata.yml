name: Update source metadata
on:
  workflow_dispatch:
  schedule: [{ cron: '17 3 * * 1' }]
permissions: { contents: write }
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python pipeline/main.py
      - run: |
          git diff --quiet || (git config user.name 'github-actions[bot]' && git config user.email '41898282+github-actions[bot]@users.noreply.github.com' && git add public/data && git commit -m 'chore(data): update verified source metadata' && git push)
